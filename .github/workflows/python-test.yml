name: Python Test (Compute)
run-name: ${{ github.actor }} - Python Test (Compute)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Compute/requirements.txt

      - name: Run pytest
        working-directory: Compute
        run: pytest -v
