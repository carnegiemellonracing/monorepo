name: Python Lint (Compute)
run-name: ${{ github.actor }} - Python Lint (Compute)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install black and isort
        run: |
          python -m pip install --upgrade pip
          pip install black==24.10.0 isort==5.13.2

      - name: Run black --check on Compute/
        run: black --check Compute/

      - name: Run isort --check-only on Compute/
        run: isort --check-only --profile black Compute/
