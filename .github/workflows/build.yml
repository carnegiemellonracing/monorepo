name: Build
run-name: ${{ github.actor }}-${{ github.repository }} Build 🚀

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build Project
        run: cmake --build build
